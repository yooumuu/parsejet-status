owner: yooumuu
repo: parsejet-status

sites:
  - name: Website
    url: https://parsejet.com
  - name: API
    url: https://api.parsejet.com/api/health
  - name: Parse (URL)
    url: https://api.parsejet.com/v1/parse/auto/url
    method: POST
    headers:
      - "Content-Type: application/json"
    body: '{"url": "https://example.com"}'
    expectedStatusCodes:
      - 200
      - 429

status-website:
  cname: status.parsejet.com
  logoUrl: https://parsejet.com/favicon.svg
  name: ParseJet Status
  introTitle: "**ParseJet** system status"
  introMessage: Real-time uptime monitoring for [ParseJet](https://parsejet.com) — the universal file and URL parsing API. Powered by [Upptime](https://github.com/upptime/upptime).
  theme: dark
  navbar:
    - title: Status
      href: /
    - title: ParseJet
      href: https://parsejet.com
    - title: API Docs
      href: https://parsejet.com/docs
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
